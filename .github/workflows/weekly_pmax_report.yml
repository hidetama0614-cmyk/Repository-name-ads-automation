name: Weekly P-MAX Creative Report

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜日 09:00 JST (00:00 UTC)
  workflow_dispatch:       # GitHub画面から手動実行も可能

jobs:
  pmax-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    defaults:
      run:
        working-directory: マーケティング

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存関係をインストール
        run: pip install google-ads gspread google-auth python-dotenv requests google-genai

      - name: サービスアカウントJSONを復元
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: P-MAX クリエイティブ週次レポートを実行
        env:
          GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
          GOOGLE_ADS_CLIENT_ID:       ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
          GOOGLE_ADS_CLIENT_SECRET:   ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
          GOOGLE_ADS_REFRESH_TOKEN:   ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
          GOOGLE_ADS_CUSTOMER_ID:     ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
          GEMINI_API_KEY:             ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL:          ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python pmax_report.py
