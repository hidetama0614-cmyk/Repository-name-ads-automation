name: Daily Meta Frequency Alert

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日 09:00 JST (00:00 UTC)
  workflow_dispatch:       # GitHub画面から手動実行も可能

jobs:
  meta-frequency-alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python のセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存関係をインストール
        run: pip install gspread google-auth python-dotenv requests

      - name: サービスアカウントJSONを復元
        run: echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > service_account.json

      - name: Meta フリークエンシーアラートを実行
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python マーケティング/meta_frequency_alert.py
